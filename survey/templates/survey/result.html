{% extends 'survey/base.html' %}

{% block content %}
<div style="padding: 0;">
    <img src="https://i.imgur.com/Ux15VCH.png" style="width: 150px; margin: 40px 0;">
    
    <div style="background-color: #F8BBD0; padding: 40px 20px; border-radius: 0; min-height: 60vh;">
        <h3 style="font-size: 18px; margin-bottom: 5px;">당신은...</h3>
        <h2 style="font-size: 20px; font-weight: bold; margin-bottom: 5px;">메가 트렌드를 이끄는</h2>
        <h1 style="font-size: 28px; font-weight: 900; color: white; margin-bottom: 20px;">트렌드세터 Trendsetter</h1>
        
        <div style="width: 40px; height: 4px; background-color: white; margin: 0 auto 30px;"></div>
        
        <p style="text-align: left; font-size: 14px; line-height: 1.8; word-break: keep-all;">
            새로운 흐름을 누구보다 빠르게 감지하고, 자신만의 기준과 시선으로 해석해내는 사람입니다.<br><br>
            단순히 트렌드를 따르기보다, 스스로의 취향과 생각을 기반으로 새로운 방향을 만들어냅니다.<br><br>
            당신의 깊이 있는 인사이트와 감각적인 선택은 주변에 자연스럽게 영향을 미치며, 앞으로의 흐름을 형성하는 데 중요한 역할을 합니다 :)
        </p>
    </div>
</div>
{% endblock %}
